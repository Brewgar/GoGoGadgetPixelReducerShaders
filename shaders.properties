====================================
  LowRes Shader - Kurulum ve Kullanim
  Iris Shaders 1.20.1
====================================

[ KURULUM ]
1. Bu klasoru (.minecraft/shaderpacks/) dizinine tasiy.
   Veya ZIP olarak icine at - Iris ikisini de destekler.

2. Minecraft'i ac, Options > Video Settings > Shaders
3. LowResShader'i sec.

------------------------------------
[ KULLANIM ]
Shader Options menusunden (Shaders ekraninda "Shader Options" butonu)
PIXEL_SIZE degerini ayarlayabilirsin:

  1  = Neredeyse normal (minimal etki)
  4  = Klasik duşük cozunurluk (varsayilan, onerilir)
  8  = Belirgin piksel gorunumu
  16 = Asiri retro / Game Boy hissi
  32 = Neredeyse indistinguishable bloklar

------------------------------------
[ NOTLAR ]
- Efekt 3D dunyaya uygulanir, HUD/UI etkilenmez.
- Shader cok hafiftir, FPS'e neredeyse hic etkisi yoktur.
- Diger shader'larla birlikte KULLANILMAZ
  (sadece tek basina calisir).

====================================
